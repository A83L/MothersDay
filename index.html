<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Für Mama 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">

<script>
const CONFIG = {
  heading:"Für Mama 💌", from:"Dein Kind",
  music:"", autoplay:false, autoAdvanceMs:5000,
  swish:"",          // "assets/swish.mp3" — Geräusch beim Blättern/Öffnen
  theme:{bg:"#fdf6ee",glow1:"rgba(255,200,160,0.45)",glow2:"rgba(255,180,200,0.30)",glow3:"rgba(255,220,180,0.20)"},
  pages:[
    {text:"Liebe Mama,\n\nkein Tag vergeht, an dem ich nicht dankbar bin, dich zu haben."},
    {text:"Du hast mir beigebracht, wie man fällt — und wie man wieder aufsteht."},
    {text:"Danke für jede Umarmung, jedes Lachen und jede stille Stunde."},
    {text:"In Liebe,\n\n— Dein Kind ❤"}
  ],
  polaroids:[
    {photo:"",caption:"Ein besonderer Moment"},
    {photo:"",caption:"Gemeinsam ❤"},
    {photo:"",caption:"Unvergesslich"},
    {photo:"",caption:"Für immer"},
    {photo:"",caption:"Danke, Mama"},
    {photo:"",caption:"In Liebe"}
  ]
};
</script>

<style>
:root{
  --bg:#fdf6ee; --bg-rgb:253,246,238;
  --g1:rgba(255,200,160,0.45); --g2:rgba(255,180,200,0.30); --g3:rgba(255,220,180,0.20);
  --paper:#fdf8f0; --ps:rgba(180,140,100,0.18);
  --ink:#2c1f14; --inkl:#8a6a52; --rose:#c4748a; --gold:#c8965a; --polar:#fefcf8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;overflow:hidden;position:relative;user-select:none;}

/* Glows */
.glows{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.glows::before{content:'';position:absolute;width:70vmax;height:70vmax;top:-20vmax;left:-15vmax;background:radial-gradient(circle,var(--g1) 0%,transparent 70%);animation:ga 14s ease-in-out infinite alternate;}
.glows::after{content:'';position:absolute;width:60vmax;height:60vmax;bottom:-15vmax;right:-10vmax;background:radial-gradient(circle,var(--g2) 0%,transparent 70%);animation:gb 18s ease-in-out infinite alternate;}
.gm{position:absolute;width:50vmax;height:50vmax;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--g3) 0%,transparent 65%);animation:gc 10s ease-in-out infinite alternate;}
@keyframes ga{to{transform:translate(6vw,9vh) scale(1.12);}}
@keyframes gb{to{transform:translate(-7vw,-6vh) scale(.94);}}
@keyframes gc{to{transform:translate(-50%,-50%) scale(1.18);}}
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;opacity:.5;}

.sbtn{position:fixed;top:14px;right:14px;z-index:300;background:rgba(253,246,238,.88);backdrop-filter:blur(10px);border:.5px solid rgba(200,150,90,.28);border-radius:50px;padding:8px 14px;font-size:12px;font-family:'Cormorant Garamond',serif;color:var(--inkl);cursor:pointer;letter-spacing:.08em;display:none;transition:background .2s;}

/* ── Stage: layers stack here ── */
.stage{position:relative;z-index:10;width:min(90vw,400px);
  /* Height = viewport minus top/bottom breathing room */
  height:calc(100dvh - clamp(80px,18vh,140px));
  display:flex;align-items:center;justify-content:center;}

/* Layer: full stage area, centered content */
.layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  transition:transform .85s cubic-bezier(.25,.46,.45,.94),opacity .7s ease,filter .7s ease;
  will-change:transform,opacity;}
.layer.sf {transform:translateY(0) scale(1);    opacity:1;   filter:none;        z-index:20;pointer-events:all;}
.layer.sb {transform:translateY(12px) scale(.88);opacity:.46; filter:blur(1.5px); z-index:10;pointer-events:none;}
.layer.sh {transform:translateY(28px) scale(.82);opacity:0;   filter:blur(3px);   z-index:5; pointer-events:none;}

/* ══ ENVELOPE ══ */
#lEnv{flex-direction:column;gap:0;}
.env-outer{display:flex;flex-direction:column;align-items:center;gap:18px;}
.env{width:clamp(158px,42vw,218px);height:clamp(110px,29vw,152px);position:relative;cursor:pointer;filter:drop-shadow(0 8px 28px rgba(180,120,80,.24));animation:ef 5s ease-in-out infinite;}
.env:hover{animation:none;transform:scale(1.04) rotate(1deg);transition:transform .25s;}
@keyframes ef{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-12px) rotate(1deg);}}
.eb{position:absolute;inset:0;background:linear-gradient(160deg,#f9efe0,#f2e2cc);border-radius:4px;border:.5px solid rgba(200,150,90,.35);}
.ef2{position:absolute;top:0;left:0;right:0;height:55%;clip-path:polygon(0 0,50% 55%,100% 0);background:linear-gradient(160deg,#f4e4cc,#ead4b0);border-radius:4px 4px 0 0;transform-origin:top center;transition:transform 1.1s cubic-bezier(.34,1.56,.64,1);}
.ef2.open{transform:rotateX(180deg);}
.etl{position:absolute;bottom:0;left:0;width:50%;height:60%;background:linear-gradient(135deg,#f0dfc0,#e8d0a8);clip-path:polygon(0 100%,0 0,100% 100%);}
.etr{position:absolute;bottom:0;right:0;width:50%;height:60%;background:linear-gradient(225deg,#f0dfc0,#e8d0a8);clip-path:polygon(100% 100%,100% 0,0 100%);}
.etb{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(180deg,#f9efe0,#f0dfc0);clip-path:polygon(0 100%,50% 0,100% 100%);}
.es{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(30px,7.5vw,40px);height:clamp(30px,7.5vw,40px);background:radial-gradient(circle at 40% 40%,#d4758a,#a8445c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3vw,16px);box-shadow:0 2px 10px rgba(168,68,92,.45);z-index:2;transition:opacity .3s,transform .3s;}
.es.gone{opacity:0;transform:translate(-50%,-50%) scale(.4);}
.ep{position:absolute;bottom:0;left:10%;right:10%;height:0;z-index:1;background:linear-gradient(180deg,#fffdf8,#fdf8f0);border-radius:2px 2px 0 0;transition:height 1s cubic-bezier(.34,1.2,.64,1) .4s;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ep.open{height:68%;}
.eph{font-size:clamp(14px,4vw,20px);opacity:0;transform:translateY(10px);transition:opacity .4s .9s,transform .4s .9s;}
.ep.open .eph{opacity:1;transform:translateY(0);}
.elabel{font-family:'Caveat',cursive;font-size:clamp(15px,4vw,19px);color:var(--inkl);letter-spacing:.06em;text-align:center;margin-top:4px;}
.efrom{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(11px,2.8vw,13px);color:var(--inkl);letter-spacing:.06em;text-align:center;opacity:.65;margin-top:2px;}
.ehint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(11px,2.8vw,13px);color:var(--inkl);letter-spacing:.1em;text-transform:uppercase;animation:pls 2.5s 1s ease-in-out infinite;opacity:.5;}
@keyframes pls{0%,100%{opacity:.5;}50%{opacity:.2;}}

/* ══ LETTER ══ */
#lLetter{align-items:center;padding:clamp(54px,11vh,80px) 2px clamp(60px,12vh,90px);}
.letter{position:relative;width:100%;background:var(--paper);border-radius:3px;padding:clamp(16px,4vw,26px) clamp(16px,4vw,28px) clamp(10px,2.5vw,16px);box-shadow:0 2px 4px var(--ps),0 8px 28px rgba(180,130,80,.14),0 24px 48px rgba(160,110,60,.08),inset 0 0 0 .5px rgba(200,160,100,.18);display:flex;flex-direction:column;
  height: clamp(300px, 56vh, 460px); /* always same height — text scrolls inside */
}
.letter::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(180,140,100,.1) 31px,rgba(180,140,100,.1) 32px);background-position:0 clamp(46px,11.5vw,68px);pointer-events:none;border-radius:3px;}
.letter::after{content:'';position:absolute;top:0;bottom:0;left:clamp(40px,10vw,54px);width:1px;background:rgba(196,116,138,.2);pointer-events:none;}
.pnum{position:absolute;top:10px;right:12px;font-family:'Caveat',cursive;font-size:12px;color:var(--inkl);opacity:.36;letter-spacing:.04em;}
.ldate{font-family:'Caveat',cursive;font-size:clamp(11px,2.8vw,13px);color:var(--inkl);opacity:.5;text-align:right;margin-bottom:5px;}
.lto{font-family:'Caveat',cursive;font-size:clamp(14px,3.8vw,18px);color:var(--ink);margin-bottom:clamp(8px,2vw,14px);}
.ltxt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(15px,4vw,20px);font-weight:300;color:var(--ink);line-height:1.9;white-space:pre-line;flex:1;letter-spacing:.01em;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.lnav{display:flex;align-items:center;justify-content:space-between;margin-top:clamp(8px,2vw,14px);padding-top:8px;border-top:.5px solid rgba(200,160,100,.15);}
.lbtn{background:rgba(253,246,238,.8);border:.5px solid rgba(200,150,90,.25);border-radius:50px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(12px,3vw,14px);color:var(--ink);letter-spacing:.06em;padding:7px 14px;transition:all .2s;}
.lbtn:hover{background:rgba(253,246,238,1);} .lbtn:disabled{opacity:.2;cursor:default;border-color:transparent;background:none;}
.ldots{display:flex;gap:6px;align-items:center;}
.ldot{width:5px;height:5px;border-radius:50%;background:rgba(180,130,80,.2);transition:all .3s;cursor:pointer;}
.ldot.on{background:var(--gold);transform:scale(1.5);}
/* "Zu den Fotos" — last page */
.tpbtn{display:none;width:100%;margin-top:clamp(8px,2vw,14px);background:linear-gradient(135deg,rgba(196,116,138,.12),rgba(200,150,90,.1));border:.5px solid rgba(196,116,138,.3);border-radius:50px;padding:10px 18px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(13px,3.3vw,15px);color:var(--ink);letter-spacing:.06em;text-align:center;transition:background .2s;}
.tpbtn:hover{background:linear-gradient(135deg,rgba(196,116,138,.22),rgba(200,150,90,.18));}
@keyframes tR{0%{transform:translateX(0);opacity:1;}40%{transform:translateX(24px) rotateY(-5deg);opacity:0;}60%{transform:translateX(-24px) rotateY(5deg);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes tL{0%{transform:translateX(0);opacity:1;}40%{transform:translateX(-24px) rotateY(5deg);opacity:0;}60%{transform:translateX(24px) rotateY(-5deg);opacity:0;}100%{transform:translateX(0);opacity:1;}}
.letter.tr{animation:tR .46s cubic-bezier(.4,0,.2,1);}
.letter.tl{animation:tL .46s cubic-bezier(.4,0,.2,1);}

/* ══ POLAROIDS ══ */
#lPol{flex-direction:column;align-items:center;gap:0;}
.pstak{position:relative;width:min(64vw,248px);height:min(80vw,305px);cursor:pointer;touch-action:none;}
.pol{position:absolute;inset:0;background:var(--polar);border-radius:2px;box-shadow:0 4px 16px rgba(0,0,0,.13),0 0 0 .5px rgba(0,0,0,.05);padding:clamp(6px,1.6vw,9px) clamp(6px,1.6vw,9px) clamp(24px,6vw,38px);display:flex;flex-direction:column;transition:transform .46s cubic-bezier(.25,.46,.45,.94),opacity .36s ease;will-change:transform;overflow:hidden;}
.pol.pc {z-index:10;transform:rotate(0deg) translateY(0);box-shadow:0 8px 28px rgba(0,0,0,.16);}
.pol.pb1{z-index:9; transform:rotate(-3.5deg) translate(-9px,9px);}
.pol.pb2{z-index:8; transform:rotate(4deg) translate(11px,16px);}
.pol.pb3{z-index:7; transform:rotate(-2deg) translate(-4px,22px);}
.pol.pb4{z-index:6; transform:rotate(3.5deg) translate(7px,28px);}
.pol.ph {z-index:5; opacity:0;transform:translateY(30px);pointer-events:none;}
.piw{flex:1;overflow:hidden;border-radius:1px;background:linear-gradient(135deg,rgba(200,160,120,.13),rgba(180,140,100,.08));display:flex;align-items:center;justify-content:center;}
.pimg{width:100%;height:100%;object-fit:cover;display:block;}
.pph{font-size:clamp(24px,6.5vw,38px);opacity:.32;}
.pcap{font-family:'Caveat',cursive;font-size:clamp(12px,3vw,15px);font-weight:500;color:var(--ink);text-align:center;letter-spacing:.03em;padding:clamp(6px,1.6vw,10px) 4px 0;line-height:1.25;}
@keyframes fR{0%{transform:rotate(0) translateY(0);opacity:1;}100%{transform:rotate(9deg) translateX(120%) translateY(-18px);opacity:0;}}
@keyframes fL{0%{transform:rotate(0) translateY(0);opacity:1;}100%{transform:rotate(-9deg) translateX(-120%) translateY(-18px);opacity:0;}}
.pol.flr{animation:fR .4s cubic-bezier(.4,0,1,1) forwards;}
.pol.fll{animation:fL .4s cubic-bezier(.4,0,1,1) forwards;}
.aring{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);width:22px;height:22px;opacity:0;transition:opacity .4s;}
.aring.show{opacity:.4;}
.aring svg{transform:rotate(-90deg);}
.aring circle{fill:none;stroke:var(--inkl);stroke-width:2;stroke-linecap:round;stroke-dasharray:63;stroke-dashoffset:63;transition:stroke-dashoffset 1s linear;}
.pcnt{margin-top:clamp(38px,8.5vw,52px);font-family:'Caveat',cursive;font-size:13px;color:var(--inkl);letter-spacing:.08em;opacity:.42;}
.phint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--inkl);letter-spacing:.1em;text-transform:uppercase;opacity:.42;margin-top:5px;animation:hf 4s 1.5s forwards;}
@keyframes hf{0%{opacity:.42}70%{opacity:.42}100%{opacity:0}}

/* ── Bottom button (identical for all states that need it) ── */
/* ── Bottom back button ── */
#bbtn{position:fixed;bottom:clamp(18px,4vh,30px);left:50%;transform:translateX(-50%);z-index:9999;background:rgba(253,246,238,.95);backdrop-filter:blur(14px);border:.5px solid rgba(200,150,90,.38);border-radius:50px;padding:11px 26px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(13px,3.4vw,15px);color:var(--ink);letter-spacing:.07em;white-space:nowrap;box-shadow:0 3px 20px rgba(180,120,60,.18);transition:background .2s,transform .15s;display:none;}
#bbtn:hover{background:rgba(253,246,238,1);}
#bbtn:active{transform:translateX(-50%) scale(.97);}

/* ── Choice layer ── */
#lChoice{flex-direction:column;align-items:center;gap:clamp(18px,4vh,28px);}
.choice-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(18px,4.5vw,24px);color:var(--ink);letter-spacing:.04em;text-align:center;opacity:0;animation:fi2 .7s .1s ease forwards;}
@keyframes fi2{to{opacity:1;}}
.choice-row{display:flex;gap:clamp(16px,5vw,28px);align-items:flex-end;justify-content:center;opacity:0;animation:fi2 .7s .3s ease forwards;}
.choice-item{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:transform .2s;}
.choice-item:hover{transform:scale(1.05) rotate(1deg);}
.choice-item:active{transform:scale(.97);}
.choice-lbl{font-family:'Caveat',cursive;font-size:clamp(13px,3.5vw,16px);color:var(--inkl);letter-spacing:.05em;text-align:center;transition:color .2s;}
.choice-item:hover .choice-lbl{color:var(--ink);}

/* Mini envelope for choice */
.mini-env{width:clamp(88px,24vw,130px);height:clamp(62px,17vw,91px);position:relative;filter:drop-shadow(0 5px 14px rgba(180,120,80,.2));animation:ef 5s ease-in-out infinite;}
@keyframes ef2{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(1.5deg);}}
.mini-env{animation:ef2 5s ease-in-out infinite;}
.mini-env .eb{position:absolute;inset:0;background:linear-gradient(160deg,#f9efe0,#f2e2cc);border-radius:3px;border:.5px solid rgba(200,150,90,.3);}
.mini-env .ef2b{position:absolute;top:0;left:0;right:0;height:55%;clip-path:polygon(0 0,50% 55%,100% 0);background:linear-gradient(160deg,#f4e4cc,#ead4b0);border-radius:3px 3px 0 0;}
.mini-env .etl{position:absolute;bottom:0;left:0;width:50%;height:58%;background:linear-gradient(135deg,#f0dfc0,#e8d0a8);clip-path:polygon(0 100%,0 0,100% 100%);}
.mini-env .etr{position:absolute;bottom:0;right:0;width:50%;height:58%;background:linear-gradient(225deg,#f0dfc0,#e8d0a8);clip-path:polygon(100% 100%,100% 0,0 100%);}
.mini-env .etb{position:absolute;bottom:0;left:0;right:0;height:53%;background:linear-gradient(180deg,#f9efe0,#f0dfc0);clip-path:polygon(0 100%,50% 0,100% 100%);}
.mini-env .es2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(20px,5.5vw,28px);height:clamp(20px,5.5vw,28px);background:radial-gradient(circle at 40% 40%,#d4758a,#a8445c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(9px,2.3vw,12px);box-shadow:0 1px 6px rgba(168,68,92,.4);z-index:2;}

/* Mini polaroid stack for choice */
.mini-polstack{position:relative;width:clamp(72px,20vw,108px);height:clamp(88px,24vw,132px);animation:mp 5.5s ease-in-out infinite .6s;}
@keyframes mp{0%,100%{transform:translateY(0) rotate(.5deg);}50%{transform:translateY(-8px) rotate(-1deg);}}
.mini-pol{position:absolute;inset:0;background:var(--polar);border-radius:2px;box-shadow:0 2px 8px rgba(0,0,0,.12);padding:clamp(4px,1vw,6px) clamp(4px,1vw,6px) clamp(14px,3.5vw,20px);display:flex;flex-direction:column;gap:2px;}
.mini-pol:nth-child(1){transform:rotate(-5deg) translate(-7px,6px);}
.mini-pol:nth-child(2){transform:rotate(3.5deg) translate(7px,3px);}
.mini-pol:nth-child(3){transform:rotate(-1deg);z-index:2;}
.mini-pol-img{flex:1;background:linear-gradient(135deg,rgba(200,160,120,.2),rgba(180,140,100,.12));display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.2vw,18px);border-radius:1px;}
.mini-pol-cap{font-family:'Caveat',cursive;font-size:clamp(5px,1.5vw,8px);color:var(--inkl);text-align:center;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,31,20,.88);color:#fff;padding:8px 18px;border-radius:50px;font-size:12px;font-family:'Cormorant Garamond',serif;letter-spacing:.06em;opacity:0;transition:all .25s;z-index:500;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="glows"><div class="gm"></div></div>
<button class="sbtn" id="sb">♪ Musik</button>
<audio id="bgm" loop></audio>
<button id="bbtn">← Von vorne beginnen</button>

<div class="stage" id="stage">

  <!-- ENVELOPE -->
  <div class="layer sf" id="lEnv">
    <div class="env-outer">
      <div class="env" id="envEl">
        <div class="eb"></div>
        <div class="etl"></div><div class="etr"></div><div class="etb"></div>
        <div class="ef2" id="eflap"></div>
        <div class="es" id="eseal">❤</div>
        <div class="ep" id="epeek"><div class="eph">💌</div></div>
      </div>
      <div class="elabel" id="elabel">Für Mama 💌</div>
      <div class="efrom" id="efrom">von Deinem Kind</div>
      <div class="ehint">Tippen zum Öffnen</div>
    </div>
  </div>

  <!-- LETTER -->
  <div class="layer sh" id="lLetter">
    <div style="width:100%">
      <div class="letter" id="letter">
        <div class="pnum" id="pnum">1/1</div>
        <div class="ldate" id="ldate"></div>
        <div class="lto">Liebe Mama,</div>
        <div class="ltxt" id="ltxt"></div>
        <div class="lnav">
          <button class="lbtn" id="prevBtn" disabled>← zurück</button>
          <div class="ldots" id="ldots"></div>
          <button class="lbtn" id="nextBtn">weiter →</button>
        </div>
        <button class="tpbtn" id="tpbtn">Zu den Fotos ansehen ✦</button>
      </div>
    </div>
  </div>

  <!-- POLAROIDS -->
  <div class="layer sh" id="lPol">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="pstak" id="pstak">
        <div class="aring" id="aring"><svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" id="ringC"/></svg></div>
      </div>
      <div class="pcnt" id="pcnt"></div>
      <div class="phint">← Wischen oder Tippen →</div>
    </div>
  </div>

  <!-- CHOICE — appears after polaroids, allows switching between letter & polaroid -->
  <div class="layer sh" id="lChoice">
    <div class="choice-title">Was möchtest du öffnen?</div>
    <div class="choice-row">
      <div class="choice-item" id="choiceLetter">
        <div class="mini-env">
          <div class="eb"></div>
          <div class="etl"></div><div class="etr"></div><div class="etb"></div>
          <div class="ef2b"></div>
          <div class="es2">❤</div>
        </div>
        <div class="choice-lbl">Brief</div>
      </div>
      <div class="choice-item" id="choicePolaroid">
        <div class="mini-polstack">
          <div class="mini-pol"><div class="mini-pol-img">📷</div><div class="mini-pol-cap">Erinnerung</div></div>
          <div class="mini-pol"><div class="mini-pol-img">🌸</div><div class="mini-pol-cap">Moment</div></div>
          <div class="mini-pol"><div class="mini-pol-img">💌</div><div class="mini-pol-cap">Für Mama</div></div>
        </div>
        <div class="choice-lbl">Fotos</div>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toastEl"></div>

<script>
'use strict';

// ── Theme ──
(function(){
  const T=CONFIG.theme||{},R=document.documentElement.style;
  if(T.bg){R.setProperty('--bg',T.bg);const h=T.bg.replace('#','');const hh=h.length===3?h.split('').map(x=>x+x).join(''):h;R.setProperty('--bg-rgb',`${parseInt(hh.slice(0,2),16)},${parseInt(hh.slice(2,4),16)},${parseInt(hh.slice(4,6),16)}`);}
  if(T.glow1)R.setProperty('--g1',T.glow1);if(T.glow2)R.setProperty('--g2',T.glow2);if(T.glow3)R.setProperty('--g3',T.glow3);
})();

// ── Text init ──
document.getElementById('elabel').textContent=CONFIG.heading||'Für Mama 💌';
document.getElementById('efrom').textContent=`von ${CONFIG.from||'Deinem Kind'}`;
document.title=CONFIG.heading||'Für Mama 💌';
const MO=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const n=new Date();
document.getElementById('ldate').textContent=`${n.getDate()}. ${MO[n.getMonth()]} ${n.getFullYear()}`;

// ── Music ──
const aud=document.getElementById('bgm'),sb=document.getElementById('sb');
let mOn=false;
if(CONFIG.music){sb.style.display='';aud.src=CONFIG.music;aud.loop=true;sb.textContent='♪ Musik';
  sb.addEventListener('click',()=>{mOn=!mOn;mOn?aud.play().catch(()=>{}):aud.pause();sb.textContent=mOn?'♫ Musik':'♪ Musik';});}
function unlockAudio(){if(CONFIG.music&&CONFIG.autoplay&&!mOn){aud.play().then(()=>{mOn=true;sb.textContent='♫ Musik';}).catch(()=>{});}}

// ── Swish sound ──
const swishAud = new Audio();
if(CONFIG.swish){ swishAud.src = CONFIG.swish; swishAud.preload='auto'; }
function playSwish(){
  if(!CONFIG.swish) return;
  swishAud.currentTime = 0;
  swishAud.play().catch(()=>{});
}

// ── State machine ──
const eL=document.getElementById('lEnv');
const ltL=document.getElementById('lLetter');
const pL=document.getElementById('lPol');
const cL=document.getElementById('lChoice');
const bbtn=document.getElementById('bbtn');

function lay(el,s){ el.className=`layer ${s}`; }

function showBbtn(txt){
  bbtn.textContent = txt;
  bbtn.style.setProperty('display','flex','important');
}
function hideBbtn(){ bbtn.style.setProperty('display','none','important'); }

function goState(s){
  hideBbtn();

  if(s==='env'){
    [eL,ltL,pL,cL].forEach(l=>lay(l,'sh'));
    lay(eL,'sf');

  } else if(s==='letter'){
    [pL,cL].forEach(l=>lay(l,'sh'));
    lay(eL,'sb');
    lay(ltL,'sf');
    initLetter();
    showBbtn('← Zurück zur Auswahl');

  } else if(s==='polaroid'){
    stopA();
    [eL,cL].forEach(l=>lay(l,'sh'));
    lay(ltL,'sb');
    lay(pL,'sf');
    showBbtn('← Zurück zur Auswahl');
    startPolaroids();

  } else if(s==='choice'){
    stopA();
    [eL,ltL,pL].forEach(l=>lay(l,'sh'));
    lay(cL,'sf');
    showBbtn('↺ Von vorne beginnen');
  }
}

// Choice buttons
document.getElementById('choiceLetter').addEventListener('click',()=>{ playSwish(); goState('letter'); });
document.getElementById('choicePolaroid').addEventListener('click',()=>{ playSwish(); goState('polaroid'); });

// ── Envelope ──
let envDone=false;
function openEnv(){
  if(envDone)return; envDone=true; unlockAudio(); playSwish();
  setTimeout(()=>document.getElementById('eseal').classList.add('gone'),300);
  setTimeout(()=>document.getElementById('eflap').classList.add('open'),500);
  setTimeout(()=>document.getElementById('epeek').classList.add('open'),900);
  setTimeout(()=>goState('letter'),1900);
}
const envEl=document.getElementById('envEl');
envEl.addEventListener('click',openEnv);
envEl.addEventListener('touchend',e=>{e.preventDefault();openEnv();},{passive:false});

// ── Letter ──
const pages=CONFIG.pages||[];
let curP=0;

function initLetter(){curP=0;buildDots();renderP(0);}
function buildDots(){
  const dc=document.getElementById('ldots');dc.innerHTML='';
  pages.forEach((_,i)=>{const d=document.createElement('div');d.className='ldot'+(i===0?' on':'');d.addEventListener('click',()=>goP(i,i>curP?'r':'l'));dc.appendChild(d);});
}
function renderP(i){
  document.getElementById('pnum').textContent=`${i+1} / ${pages.length}`;
  document.getElementById('ltxt').textContent=(pages[i]||{}).text||'';
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===pages.length-1;
  document.querySelectorAll('.ldot').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.getElementById('tpbtn').style.display=i===pages.length-1?'block':'none';
}
function goP(i,dir){
  if(i===curP||i<0||i>=pages.length)return;
  playSwish();
  const l=document.getElementById('letter');
  l.classList.add(dir==='r'?'tr':'tl');
  setTimeout(()=>{curP=i;renderP(i);},230);
  setTimeout(()=>l.classList.remove('tr','tl'),490);
}
document.getElementById('nextBtn').addEventListener('click',()=>goP(curP+1,'r'));
document.getElementById('prevBtn').addEventListener('click',()=>goP(curP-1,'l'));
document.getElementById('tpbtn').addEventListener('click',()=>{ playSwish(); goState('polaroid'); });


// Letter swipe
let ltx=0,lmx=0,ldrag=false;
const lEl=document.getElementById('letter');
lEl.addEventListener('touchstart',e=>{ltx=e.touches[0].clientX;},{passive:true});
lEl.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-ltx;if(Math.abs(dx)>36){dx<0?goP(curP+1,'r'):goP(curP-1,'l');}},{passive:true});
lEl.addEventListener('mousedown',e=>{lmx=e.clientX;ldrag=false;});
window.addEventListener('mousemove',e=>{if(Math.abs(e.clientX-lmx)>6)ldrag=true;});
lEl.addEventListener('mouseup',e=>{if(ldrag){const dx=e.clientX-lmx;if(Math.abs(dx)>40){dx<0?goP(curP+1,'r'):goP(curP-1,'l');}}});

// ── Polaroids ──
const polData=(CONFIG.polaroids||[]).filter(p=>p.photo||p.caption);
let pi=0,cards=[];
let aT=null,aIv=null;
const ringEl=document.getElementById('aring'),ringC=document.getElementById('ringC'),CIRC=63;
const stkEl=document.getElementById('pstak');
const POS=['pc','pb1','pb2','pb3','pb4','ph'];

function startPolaroids(){
  stkEl.querySelectorAll('.pol').forEach(e=>e.remove());
  cards=[];pi=0;
  const tot=Math.min(polData.length,6);
  if(!tot){return;}
  for(let i=0;i<tot;i++){
    const p=polData[i],c=document.createElement('div');
    c.className='pol ph';
    c.innerHTML=`<div class="piw">${p.photo?`<img class="pimg" src="${p.photo}" loading="lazy" alt="">` :'<div class="pph">📷</div>'}</div><div class="pcap">${p.caption||''}</div>`;
    stkEl.insertBefore(c,ringEl);cards.push(c);
  }
  updP();
  document.getElementById('pcnt').textContent=`${pi+1} / ${cards.length}`;
  resetA();
}
function updP(){
  const n=cards.length;
  cards.forEach((c,i)=>{const r=(i-pi+n)%n;c.className='pol '+(r<POS.length?POS[r]:'ph');});
  document.getElementById('pcnt').textContent=`${pi+1} / ${cards.length}`;
}
function advP(d){
  if(cards.length<2)return;
  playSwish();
  const cur=cards[pi];cur.classList.add(d>0?'fll':'flr');
  setTimeout(()=>{cur.classList.remove('fll','flr');pi=(pi+d+cards.length)%cards.length;updP();},400);
  resetA();
}
function resetA(){
  clearTimeout(aT);clearInterval(aIv);
  ringEl.classList.remove('show');ringC.style.strokeDashoffset=CIRC;
  const delay=CONFIG.autoAdvanceMs||5000;
  aT=setTimeout(()=>{ringEl.classList.add('show');let el=0;aIv=setInterval(()=>{el+=200;ringC.style.strokeDashoffset=CIRC*(1-el/delay);if(el>=delay){clearInterval(aIv);advP(1);}},200);},1500);
}
function stopA(){clearTimeout(aT);clearInterval(aIv);ringEl.classList.remove('show');}

// Polaroid touch/mouse
let ptx=0,pdn=false,pmv=false,pmx=0,pmv2=false;
stkEl.addEventListener('touchstart',e=>{ptx=e.touches[0].clientX;pdn=true;pmv=false;},{passive:true});
stkEl.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-ptx)>8)pmv=true;},{passive:true});
stkEl.addEventListener('touchend',e=>{if(!pdn)return;pdn=false;const dx=e.changedTouches[0].clientX-ptx;if(!pmv&&Math.abs(dx)<18){advP(1);return;}if(Math.abs(dx)>30){dx<0?advP(1):advP(-1);}},{passive:true});
stkEl.addEventListener('mousedown',e=>{pmx=e.clientX;pmv2=false;});
window.addEventListener('mousemove',e=>{if(Math.abs(e.clientX-pmx)>8)pmv2=true;});
stkEl.addEventListener('mouseup',e=>{const dx=e.clientX-pmx;if(!pmv2){advP(1);}else if(Math.abs(dx)>40){dx<0?advP(1):advP(-1);}});

// ── Bottom button ──
bbtn.addEventListener('click',()=>{
  if(bbtn.textContent.includes('Auswahl')) goState('choice');
  else window.location.reload();
});

// ── Toast ──
function toast(m){const t=document.getElementById('toastEl');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

// ── Start ──
goState('env');
</script>
</body>
</html>
